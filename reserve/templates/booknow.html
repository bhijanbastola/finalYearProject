{% extends "base.html" %}
{% load static %}

{% block content %}

<h1 class="page-title">Plan Your Trip</h1>

<button class="book-now-btn" onclick="openModal()">Book Now</button>

<!-- ================= BOOKING MODAL ================= -->
<div class="booking-modal" id="bookingModal">

  <div class="booking-content">

    <span class="close-modal" onclick="closeModal()">&times;</span>

    <h2>Book Your Tour</h2>

    <form method="GET" action="{% url 'maps' %}">

      <input type="text" name="fullname" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <input type="text" name="pickup" placeholder="Pickup Location" required>
      <input type="text" name="destination" placeholder="Destination Location" required>
      <input type="number" name="people" placeholder="Number of People" min="1" required>
      <input type="number" name="days" placeholder="Number of Tour Days" min="1" required>

      <div class="modal-buttons">
        <button type="submit" class="submit-btn">Continue</button>
        <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
      </div>

    </form>

  </div>
</div>

<!-- SIMPLE MODAL SCRIPT -->
<script>
function openModal() {
  document.getElementById("bookingModal").style.display = "flex";
}
function closeModal() {
  document.getElementById("bookingModal").style.display = "none";
}
</script>

{% endblock %}
