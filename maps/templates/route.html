{% extends "base.html" %}

{% block content %}
    <h1>Route Details</h1>
    <p><strong>Start Location:</strong> {{ route.start_location }}</p>
    <p><strong>End Location:</strong> {{ route.end_location }}</p>
    <p><strong>Distance:</strong> {{ route.distance }} km</p>
    <p><strong>Estimated Time:</strong> {{ route.estimated_time }} minutes</p>
    <a href="{% url "get_nearby_locations" %}">Back to Routes</a>
{% endblock %}
